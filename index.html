    <title>Profil Biodata</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .card {
        background: rgba(255,255,255,0.95);
        backdrop-filter: blur(10px);
        width: 350px;
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-5px);
      }

      .profile-img {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 15px;
        border: 4px solid #667eea;
      }

      h1 {
        font-size: 22px;
        margin-bottom: 5px;
        color: #333;
      }

      p {
        font-size: 14px;
        color: #666;
        margin-bottom: 15px;
      }

      .info {
        text-align: left;
        margin-top: 15px;
      }

      .info p {
        margin: 8px 0;
        font-size: 14px;
      }

      .btn {
    
            display: block;
        width: 80%;
        margin: 12px auto;
        padding: 12px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border-radius: 25px;
        text-decoration: none;
        transition: 0.3s;
        font-weight: bold;
        }

.btn:hover {
  transform: scale(1.05);
}
      }

      .btn:hover {
        background: #5645c0;
      }
    </style>
  </head>
